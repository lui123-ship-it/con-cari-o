<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Nuestro Set Favorito! 🏐</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&family=Teko:wght@700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0b0b10;
            background-image: 
                linear-gradient(135deg, rgba(11, 11, 16, 0.94) 0%, rgba(25, 12, 38, 0.92) 100%),
                url("https://images5.alphacoders.com/549/549931.jpg");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            font-family: 'Montserrat', sans-serif;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            padding: 20px;
        }

        .haikyuu-card {
            width: 100%;
            max-width: 410px;
            background: rgba(14, 14, 23, 0.85);
            border: 3px solid #ff6b00; 
            border-radius: 24px;
            padding: 25px 20px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(255, 107, 0, 0.25), inset 0 0 20px rgba(255, 255, 255, 0.05);
            position: relative;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        /* DISEÑO DE MARCADOR CORREGIDO Y ALINEADO */
        .scoreboard {
            background: #000;
            border: 2px solid #ff6b00;
            padding: 10px 20px;
            border-radius: 14px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-family: 'Teko', sans-serif;
            font-size: 2rem;
            letter-spacing: 1px;
            margin-bottom: 20px;
            box-shadow: 0 0 15px rgba(255, 107, 0, 0.2);
            width: 90%;
        }

        .score-label {
            font-size: 1.2rem;
            color: #ffffff;
            text-transform: uppercase;
            font-weight: 400;
        }

        .score-num-ella { color: #ff6b00; font-size: 2.4rem; font-weight: 700; }
        .score-divider { color: #ffffff; font-size: 2rem; }
        .score-num-yo { color: #ffffff; font-size: 2.4rem; font-weight: 700; }

        h1 {
            font-family: 'Teko', sans-serif;
            font-size: 3.4rem;
            line-height: 0.9;
            text-transform: uppercase;
            color: #ffffff;
            text-shadow: 3px 3px 0px #ff6b00;
            margin-bottom: 5px;
        }

        .tagline {
            font-size: 0.8rem;
            color: #ffb380;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 20px;
            font-weight: 700;
        }

        /* NUEVA IMAGEN DE CORAZONES ESTILO ANIME */
        .anime-banner {
            width: 100%;
            height: 160px;
            border-radius: 14px;
            object-fit: cover;
            border: 2px solid rgba(255, 107, 0, 0.5);
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }

        .letter-box {
            background: rgba(0, 0, 0, 0.6);
            border-left: 4px solid #ff6b00;
            border-radius: 12px;
            padding: 20px;
            text-align: left;
            font-size: 0.98rem;
            line-height: 1.7;
            color: #e5e5ec;
            margin-bottom: 20px;
            min-height: 220px;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.7);
        }

        .letter-box b {
            color: #ff6b00;
        }

        .music-player {
            background: linear-gradient(135deg, #1c1c28 0%, #0d0d14 100%);
            border: 2px solid #ff6b00;
            border-radius: 18px;
            padding: 12px 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }

        .disc-art {
            width: 52px;
            height: 52px;
            background: #ff6b00 url("https://images.unsplash.com/photo-1516450360452-9312f5e86fc7?q=80&w=200&auto=format&fit=crop") no-repeat center;
            background-size: cover;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 10px rgba(255,107,0,0.4);
        }

        .disc-art.playing {
            animation: spin 3.5s linear infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        .track-info { text-align: left; flex-grow: 1; }
        .track-title { font-size: 0.95rem; font-weight: 700; color: #fff; }
        .track-artist { font-size: 0.8rem; color: #ff6b00; font-weight: 600; margin-top: 1px; }

        .play-btn {
            background: #ff6b00;
            border: none;
            color: white;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.3rem;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(255,107,0,0.4);
        }

        .play-btn:active { transform: scale(0.9); }

        .floating-ball {
            position: absolute;
            pointer-events: none;
            opacity: 0.12;
            font-size: 1.4rem;
            animation: floatUp 7s linear infinite;
        }

        @keyframes floatUp {
            0% { transform: translateY(105vh) rotate(0deg); opacity: 0.5; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="floating-ball" style="left: 8%; animation-delay: 0s;">🏐</div>
    <div class="floating-ball" style="left: 45%; animation-delay: 3s;">🧡</div>
    <div class="floating-ball" style="left: 82%; animation-delay: 1.5s;">🏐</div>

    <div class="haikyuu-card">
        <div class="scoreboard">
            <span class="score-label">Stefany</span>
            <span class="score-num-ella">15</span>
            <span class="score-divider">:</span>
            <span class="score-num-yo">19</span>
            <span class="score-label">Luis</span>
        </div>

        <h1>¡ERES MI MVP!</h1>
        <div class="tagline">El mejor remate a mi corazón</div>

        <img class="anime-banner" src="https://images.unsplash.com/photo-1518199266791-5375a83190b7?q=80&w=600&auto=format&fit=crop" alt="Corazones">

        <div class="letter-box" id="letterText">
            Presiona el botón de reproducir abajo para encender la música de Mon Laferte y empezar a leer lo que tengo que decirte... 🏐🧡
        </div>

        <div class="music-player">
            <div class="disc-art" id="discIcon"></div>
            <div class="track-info">
                <div class="track-title">Kei Tsukishima</div>
                <div class="track-artist">Haikyū!!</div>
            </div>
            <button class="play-btn" id="playButton" onclick="startLoveMatch()">▶</button>
        </div>
    </div>

    <audio id="bgMusic" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" loop></audio>

    <script>
        const music = document.getElementById('bgMusic');
        const btn = document.getElementById('playButton');
        const disc = document.getElementById('discIcon');
        const letterContainer = document.getElementById('letterText');

        const amorTexto = "Hola, mi niña hermosa. Quería escribirte esta página especial para recordarte lo muchísimo que te amo. Sé muy bien que tú tienes 15 y yo 19, pero a tu lado he descubierto que la madurez de tu corazón no se mide en números. A pesar de que seas tan chiquita (mi pequeña Hinata), tienes una fuerza increíble que me desarma por completo. Me fascina tu forma de ser de pies a cabeza, y aunque a veces seas un poquito llorona o te pongas muy sentimental, para mí eres perfecta tal y como eres. Cada una de tus lágrimas las cambio por un abrazo fuerte. ¡Eres y siempre serás mi MVP favorita de por vida! Hagamos que este set dure para siempre. 🧡🖤";

        let index = 0;
        let isTyping = false;

        function typeWriter() {
            if (index < amorTexto.length) {
                letterContainer.innerHTML += amorTexto.charAt(index);
                index++;
                setTimeout(typeWriter, 50); 
            }
        }

        function startLoveMatch() {
            if (music.paused) {
                music.play().catch(function(error) {
                    console.log("El navegador bloqueó el inicio: ", error);
                });
                btn.innerText = "⏸";
                disc.classList.add('playing');
                
                if (!isTyping) {
                    isTyping = true;
                    letterContainer.innerHTML = ""; 
                    typeWriter();
                }
            } else {
                music.pause();
                btn.innerText = "▶";
                disc.classList.remove('playing');
            }
        }
    </script>
</body>
</html>
